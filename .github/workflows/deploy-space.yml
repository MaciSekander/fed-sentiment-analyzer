name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r backend/requirements.txt

      - name: Run backend test suite
        run: pytest tests/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check and build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser interaction tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets are set
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "::error::HF_TOKEN secret is not set. Add a HuggingFace write token as a repo secret named HF_TOKEN (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          if [ -z "${{ vars.HF_SPACE_ID }}" ]; then
            echo "::error::HF_SPACE_ID variable is not set. Add it as a repo variable (Settings > Secrets and variables > Actions > Variables), format: your-hf-username/your-space-name"
            exit 1
          fi

      - name: Assemble deploy directory
        run: |
          set -e
          mkdir -p /tmp/space_deploy
          cp -r backend /tmp/space_deploy/
          cp -r src /tmp/space_deploy/
          cp -r frontend /tmp/space_deploy/
          rm -rf /tmp/space_deploy/frontend/node_modules /tmp/space_deploy/frontend/dist
          cp requirements.txt /tmp/space_deploy/
          cp Dockerfile /tmp/space_deploy/
          cp .dockerignore /tmp/space_deploy/
          cp deploy/space_README.md /tmp/space_deploy/README.md

      - name: Push to Space
        working-directory: /tmp/space_deploy
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          set -e
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy from ${{ github.repository }}@${{ github.sha }}"
          git remote add space "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push --force space HEAD:main
